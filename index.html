<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>StrongBack - Focus Progression</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .content-padding { padding-bottom: 120px !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .modal-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #f8fafc 50%, #f1f5f9 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { from { background-position: 200% 0; } to { background-position: -200% 0; } }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .sync-active { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- NAVIGATION BASSE -->
    <nav class="fixed bottom-0 left-0 right-0 glass border-t border-slate-200 flex justify-around items-center p-6 z-[100] shadow-2xl">
        <button onclick="router('workout')" class="nav-btn flex flex-col items-center text-indigo-600" id="nav-workout">
            <i data-lucide="dumbbell"></i><span class="text-[10px] font-bold uppercase mt-1">Séance</span>
        </button>
        <button onclick="router('history')" class="nav-btn flex flex-col items-center text-slate-400" id="nav-history">
            <i data-lucide="line-chart"></i><span class="text-[10px] font-bold uppercase mt-1">Progrès</span>
        </button>
        <button onclick="router('profile')" class="nav-btn flex flex-col items-center text-slate-400" id="nav-profile">
            <i data-lucide="settings"></i><span class="text-[10px] font-bold uppercase mt-1">Profil</span>
        </button>
    </nav>

    <!-- HEADER -->
    <header class="p-5 bg-white border-b sticky top-0 z-[90] flex justify-between items-center shadow-sm">
        <div>
            <h1 id="page-title" class="text-xl font-black text-slate-800 uppercase tracking-tighter">Ma Séance</h1>
            <div id="sync-status" class="text-[9px] font-black text-slate-400 flex items-center gap-1 uppercase">
                <div id="sync-dot" class="w-2.5 h-2.5 rounded-full bg-slate-300"></div> <span id="sync-text">Vérification...</span>
            </div>
        </div>
        <button id="main-finish-btn" onclick="checkAndFinish()" class="bg-slate-900 text-white px-5 py-2.5 rounded-xl font-black text-[10px] uppercase shadow-lg active:scale-95 transition-all flex items-center gap-2">
            <i data-lucide="check-square" class="w-3.5 h-3.5"></i> Terminer
        </button>
    </header>

    <main id="app-container" class="p-4 content-padding">
        <!-- Contenu injecté ici -->
    </main>

    <!-- POPUP GÉNÉRIQUE -->
    <div id="generic-modal" class="fixed inset-0 bg-slate-900/90 z-[120] hidden flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-xs text-center shadow-2xl modal-up">
            <div id="modal-icon-container" class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <i id="modal-icon" data-lucide="zap" class="w-8 h-8 fill-current"></i>
            </div>
            <h3 id="modal-title" class="text-2xl font-black mb-2 leading-tight tracking-tighter uppercase text-slate-800 text-center">Bravo !</h3>
            <p class="text-slate-500 text-sm mb-8 font-medium leading-relaxed" id="modal-text">Texte ici</p>
            <div class="grid gap-3">
                <button id="modal-yes" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg active:scale-95 transition uppercase text-xs tracking-widest">Confirmer</button>
                <button id="modal-no" class="w-full bg-slate-100 text-slate-500 py-4 rounded-2xl font-bold active:scale-95 transition uppercase text-xs tracking-widest">Annuler</button>
            </div>
        </div>
    </div>

    <!-- POPUP CHRONO -->
    <div id="timer-modal" class="fixed inset-0 bg-indigo-900/95 z-[150] hidden flex items-center justify-center p-6 backdrop-blur-xl">
        <div class="bg-white rounded-[3rem] p-10 w-full max-w-xs text-center shadow-2xl modal-up">
            <div class="relative w-32 h-32 mx-auto mb-6">
                <svg class="w-full h-full transform -rotate-90">
                    <circle cx="64" cy="64" r="60" stroke="currentColor" stroke-width="8" fill="transparent" class="text-slate-100"/>
                    <circle id="timer-progress" cx="64" cy="64" r="60" stroke="currentColor" stroke-width="8" fill="transparent" stroke-dasharray="377" stroke-dashoffset="0" class="text-indigo-600 transition-all duration-1000 ease-linear"/>
                </svg>
                <div id="timer-display" class="absolute inset-0 flex items-center justify-center text-4xl font-black text-slate-800">60</div>
            </div>
            <h3 class="text-xl font-black uppercase mb-8 tracking-widest">Récupération...</h3>
            <button onclick="stopTimer()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase text-xs tracking-widest active:scale-95 transition">Passer</button>
        </div>
    </div>

    <!-- FICHE EXERCICE -->
    <div id="ex-modal" class="fixed inset-0 bg-white z-[110] hidden overflow-y-auto no-scrollbar">
        <div id="ex-modal-content" class="pb-20"></div>
    </div>

    <!-- GUIDE TECHNIQUE -->
    <div id="guide-modal" class="fixed inset-0 bg-slate-900 text-white z-[130] hidden overflow-y-auto p-8 no-scrollbar"></div>

    <script>
        const EX_CONFIG = {
            hack_squat: { name: 'Hack squat', sets: 3, range: [8, 12], inc: 5, rest: 90, tips: ['Pousser par les talons', 'Dos plaqué au dossier'], guide: 'Placez les pieds en haut de la plateforme pour cibler les fessiers.' },
            pulldown: { name: 'Pulldown Machine', sets: 3, range: [8, 12], inc: 2.3, rest: 90, tips: ['Omoplates serrées', 'Barre vers le haut du buste'], guide: 'Tirez avec vos coudes plutôt qu\'avec vos mains.' },
            bulgarian: { name: 'Bulgarian Split', sets: 2, range: [8, 12], inc: 4, rest: 90, tips: ['Genou avant stable', 'Pied arrière sur support'], guide: 'Gardez le tronc droit pour plus de tension.' },
            rowing: { name: 'Rowing assis', sets: 2, range: [8, 12], inc: 2.3, rest: 90, tips: ['Épaules basses', 'Coudes vers l\'arrière'], guide: 'Tirez vers votre nombril.' },
            extension: { name: 'Back extension', sets: 2, range: [12, 15], inc: 2, rest: 60, tips: ['Mouvement lent', 'Ne pas dépasser l\'alignement'], guide: 'Réglez le support juste sous les hanches.' },
            chest_press: { name: 'Chest press', sets: 2, range: [8, 12], inc: 4, rest: 90, tips: ['Omoplates fixées', 'Coudes sous les épaules'], guide: 'Expirez lors de la poussée.' }
        };

        const API_BASE = "https://api.npoint.io/";

        let state = {
            currentWeights: { hack_squat: 10, pulldown: 15, bulgarian: 4, rowing: 15, extension: 0, chest_press: 10 },
            targetReps: { hack_squat: 8, pulldown: 8, bulgarian: 8, rowing: 8, extension: 12, chest_press: 8 },
            increments: { hack_squat: 5, pulldown: 2.3, bulgarian: 4, rowing: 2.3, extension: 2, chest_press: 4 },
            history: [],
            sessionInProgress: {},
            pendingChanges: {},
            syncKey: "",
            lastUpdated: 0,
            isDirty: false
        };

        let timerInterval = null;

        function router(page) {
            updateSyncUI();
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('text-indigo-600', 'text-slate-400'));
            document.getElementById('nav-' + page).classList.replace('text-slate-400', 'text-indigo-600');
            document.getElementById('main-finish-btn').style.display = (page === 'workout') ? 'flex' : 'none';
            document.getElementById('page-title').innerText = page === 'workout' ? 'Ma Séance' : (page === 'history' ? 'Progrès' : 'Profil');
            
            const container = document.getElementById('app-container');
            container.innerHTML = ''; 

            if (page === 'workout') renderWorkout();
            else if (page === 'history') renderHistory();
            else if (page === 'profile') renderProfile();
            
            lucide.createIcons();
        }

        function renderWorkout() {
            let html = `<div class="space-y-4">`;
            Object.keys(EX_CONFIG).forEach(id => {
                const cfg = EX_CONFIG[id];
                const session = state.sessionInProgress[id];
                const isValidated = session && session.validated;
                html += `
                    <div onclick="openEx('${id}')" class="p-5 rounded-[2.5rem] border-2 bg-white shadow-sm flex justify-between items-center active:scale-95 transition ${isValidated ? 'border-green-500' : 'border-slate-100'}">
                        <div class="flex items-center gap-4">
                            ${isValidated ? '<i data-lucide="check-circle-2" class="text-green-500"></i>' : '<i data-lucide="circle" class="text-slate-200"></i>'}
                            <div>
                                <h3 class="font-black text-slate-800 uppercase text-xs tracking-wider">${cfg.name}</h3>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${cfg.sets} Sets • ${state.targetReps[id]} reps</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="text-lg font-black text-indigo-600">${state.currentWeights[id]}<small class="text-[10px] ml-0.5 font-bold">kg</small></span>
                        </div>
                    </div>`;
            });
            document.getElementById('app-container').innerHTML = html + `</div>`;
        }

        function openEx(id) {
            const cfg = EX_CONFIG[id];
            const lastPerf = state.history.find(s => s.exercises && s.exercises[id])?.exercises[id];
            const modal = document.getElementById('ex-modal');
            if (!state.sessionInProgress[id]) {
                state.sessionInProgress[id] = { weight: state.currentWeights[id], reps: new Array(cfg.sets).fill(state.targetReps[id]), validated: false };
            }
            let setsHtml = '';
            for(let i=0; i<cfg.sets; i++) {
                setsHtml += `
                    <div class="flex items-center justify-between bg-slate-50 p-5 rounded-3xl border border-slate-100">
                        <span class="font-black text-slate-400 text-[10px] uppercase tracking-widest">Série ${i+1}</span>
                        <div class="flex items-center gap-6">
                            <button onclick="changeRep('${id}', ${i}, -1)" class="w-12 h-12 bg-white shadow-sm border rounded-2xl font-black text-xl">-</button>
                            <span id="val-${id}-${i}" class="w-8 text-center font-black text-2xl select-none">${state.sessionInProgress[id].reps[i]}</span>
                            <button onclick="changeRep('${id}', ${i}, 1)" class="w-12 h-12 bg-white shadow-sm border rounded-2xl font-black text-xl">+</button>
                        </div>
                    </div>`;
            }
            document.getElementById('ex-modal-content').innerHTML = `
                <div class="bg-slate-900 text-white p-8 rounded-b-[3.5rem] shadow-xl mb-8">
                    <div class="flex justify-between items-center mb-6">
                        <button onclick="closeEx()" class="p-2 bg-white/10 rounded-full"><i data-lucide="chevron-left"></i></button>
                        <span class="font-black text-[10px] uppercase tracking-widest text-indigo-400">Exercice</span>
                        <div class="w-10"></div>
                    </div>
                    <h2 class="text-3xl font-black mb-8 leading-tight tracking-tighter">${cfg.name}</h2>
                    <div class="grid grid-cols-3 gap-3">
                        <div class="bg-white/10 p-4 rounded-3xl text-center">
                            <div class="text-[9px] uppercase font-black text-slate-400 mb-1">Poids</div>
                            <div class="text-xl font-black text-indigo-400">${state.sessionInProgress[id].weight}kg</div>
                        </div>
                        <div class="bg-white/10 p-4 rounded-3xl text-center">
                            <div class="text-[9px] uppercase font-black text-slate-400 mb-1">Cible</div>
                            <div class="text-xl font-black text-white">${state.targetReps[id]} reps</div>
                        </div>
                        <div onclick="startTimer(${cfg.rest})" class="bg-amber-500/20 p-4 rounded-3xl text-center active:scale-95 transition cursor-pointer">
                            <div class="text-[9px] uppercase font-black text-amber-500 mb-1">Repos</div>
                            <div class="text-xl font-black text-amber-500">${cfg.rest}s</div>
                        </div>
                    </div>
                </div>
                <div class="px-6 space-y-4">
                    ${lastPerf ? `
                    <div class="bg-indigo-600 p-5 rounded-[2rem] border-l-8 border-indigo-400 shadow-sm mb-4">
                        <div class="text-[10px] font-black uppercase text-indigo-200 mb-1 tracking-widest">Dernière séance</div>
                        <div class="text-sm font-black text-white italic">${lastPerf.weight}kg — ${lastPerf.reps.join(', ')}</div>
                    </div>` : ''}
                    ${setsHtml}
                    <div class="pt-6 space-y-4">
                        <button onclick="openGuide('${id}')" class="w-full bg-slate-100 text-slate-600 py-5 rounded-[2rem] font-black text-xs uppercase tracking-widest flex items-center justify-center gap-2">
                            <i data-lucide="book-open" class="w-4 h-4"></i> Guide technique
                        </button>
                        <div class="bg-amber-50 p-6 rounded-[2rem] border border-amber-100">
                            <h4 class="text-[10px] font-black uppercase text-amber-800 mb-3 flex items-center gap-2"><i data-lucide="lightbulb" class="w-4 h-4 text-amber-600"></i> Points d'attention</h4>
                            <ul class="space-y-2">
                                ${cfg.tips.map(t => `<li class="text-xs font-bold text-amber-900 flex gap-2"><span>•</span> ${t}</li>`).join('')}
                            </ul>
                        </div>
                        <button onclick="validateEx('${id}')" class="w-full bg-indigo-600 text-white py-6 rounded-[2rem] font-black shadow-xl active:scale-95 transition uppercase tracking-widest">Valider l'exercice</button>
                    </div>
                </div>`;
            modal.classList.remove('hidden'); lucide.createIcons();
        }

        function changeRep(id, idx, delta) {
            const cfg = EX_CONFIG[id];
            let current = state.sessionInProgress[id].reps[idx];
            let newVal = current + delta;
            if (newVal < 0 || newVal > cfg.range[1] + 10) return;
            state.sessionInProgress[id].reps[idx] = newVal;
            document.getElementById(`val-${id}-${idx}`).innerText = newVal;
            save();
        }

        function validateEx(id) {
            const cfg = EX_CONFIG[id];
            const reps = state.sessionInProgress[id].reps;
            const target = state.targetReps[id];
            const isFullSuccess = reps.every(r => r >= target);
            state.sessionInProgress[id].validated = true;

            if (isFullSuccess) {
                if (target >= cfg.range[1]) {
                    const nextWeight = state.currentWeights[id] + state.increments[id];
                    showGenericModal("Niveau Max !", `Passer à <b>${nextWeight}kg</b> et redescendre à <b>${cfg.range[0]} reps</b> ?`, "zap",
                        () => { state.pendingChanges[id] = { weight: nextWeight, reps: cfg.range[0] }; closeEx(); },
                        () => { delete state.pendingChanges[id]; closeEx(); });
                } else {
                    const nextReps = target + 1;
                    showGenericModal("Objectif atteint !", `Viser <b>${nextReps} répétitions</b> la prochaine fois ?`, "trending-up",
                        () => { state.pendingChanges[id] = { reps: nextReps }; closeEx(); },
                        () => { delete state.pendingChanges[id]; closeEx(); });
                }
            } else { delete state.pendingChanges[id]; closeEx(); }
        }

        function showGenericModal(title, text, icon, onYes, onNo) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerHTML = text;
            document.getElementById('modal-icon').setAttribute('data-lucide', icon);
            document.getElementById('modal-yes').onclick = () => { onYes(); hideGenericModal(); };
            document.getElementById('modal-no').onclick = () => { onNo(); hideGenericModal(); };
            document.getElementById('generic-modal').classList.remove('hidden'); lucide.createIcons();
        }

        function hideGenericModal() { document.getElementById('generic-modal').classList.add('hidden'); }

        function checkAndFinish() {
            const completedCount = Object.values(state.sessionInProgress).filter(ex => ex.validated).length;
            const total = Object.keys(EX_CONFIG).length;
            if (completedCount === 0) { alert("Aucun exercice validé."); return; }
            
            const title = completedCount < total ? "Séance incomplète" : "Terminer ?";
            const msg = completedCount < total 
                ? `Vous avez fait ${completedCount}/${total} exercices. Sauvegarder quand même ?` 
                : "Voulez-vous sauvegarder cette séance et mettre à jour vos objectifs ?";
            
            showGenericModal(title, msg, "check-circle", () => saveFinalSession(), () => {});
        }

        function saveFinalSession() {
            const finalExercises = {};
            Object.entries(state.sessionInProgress).forEach(([id, data]) => {
                if(data.validated) finalExercises[id] = data;
            });
            state.history.unshift({ date: new Date().toISOString(), exercises: finalExercises });
            Object.entries(state.pendingChanges).forEach(([id, c]) => {
                if (c.weight !== undefined) state.currentWeights[id] = c.weight;
                if (c.reps !== undefined) state.targetReps[id] = c.reps;
            });
            state.sessionInProgress = {}; state.pendingChanges = {};
            save(); router('history');
        }

        function closeEx() { document.getElementById('ex-modal').classList.add('hidden'); renderWorkout(); }

        function startTimer(seconds) {
            clearInterval(timerInterval);
            const modal = document.getElementById('timer-modal');
            const display = document.getElementById('timer-display');
            const progress = document.getElementById('timer-progress');
            let timeLeft = seconds;
            modal.classList.remove('hidden');
            display.innerText = timeLeft;
            progress.style.strokeDashoffset = 0;
            timerInterval = setInterval(() => {
                timeLeft--;
                display.innerText = timeLeft;
                progress.style.strokeDashoffset = 377 - (377 * (timeLeft / seconds));
                if (timeLeft <= 0) { stopTimer(); try { new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play(); } catch(e) {} }
            }, 1000);
        }

        function stopTimer() { clearInterval(timerInterval); document.getElementById('timer-modal').classList.add('hidden'); }

        function openGuide(id) {
            const cfg = EX_CONFIG[id];
            const modal = document.getElementById('guide-modal');
            modal.innerHTML = `
                <button onclick="document.getElementById('guide-modal').classList.add('hidden')" class="mb-6 p-3 bg-white/10 rounded-full"><i data-lucide="arrow-left"></i></button>
                <div class="mb-8 rounded-[2rem] overflow-hidden shadow-2xl border border-white/10">
                    <img src="${id}.png" alt="${cfg.name}" class="w-full h-auto block" onerror="this.style.display='none'">
                </div>
                <h2 class="text-4xl font-black mb-4 tracking-tighter">${cfg.name}</h2>
                <p class="text-lg font-medium text-slate-200 leading-relaxed mb-10">${cfg.guide || ''}</p>
                <div class="space-y-3">${cfg.tips.map(t => `<div class="flex gap-4 items-center bg-white/5 p-4 rounded-3xl border border-white/5 font-bold"><i data-lucide="check" class="text-green-400 w-5 h-5"></i> ${t}</div>`).join('')}</div>`;
            modal.classList.remove('hidden'); lucide.createIcons();
        }

        function compareSessions(s1, s2) {
            if (!s1 || !s1.exercises) return s2; if (!s2 || !s2.exercises) return s1;
            let w1 = 0, w2 = 0;
            Object.keys(EX_CONFIG).forEach(id => {
                const e1 = s1.exercises[id], e2 = s2.exercises[id];
                if (!e1 || !e2) { if (e1) w1++; if (e2) w2++; return; }
                if (e1.weight > e2.weight) w1++; else if (e2.weight > e1.weight) w2++;
                else {
                    const r1 = e1.reps.reduce((a,b)=>a+b,0), r2 = e2.reps.reduce((a,b)=>a+b,0);
                    if (r1 > r2) w1++; else if (r2 > r1) w2++;
                }
            });
            return w1 >= w2 ? s1 : s2;
        }

        function getBest(fn) {
            const f = state.history.filter(fn);
            return f.length ? f.reduce((b, c) => compareSessions(b, c), f[0]) : null;
        }

        function renderHistory() {
            const now = new Date();
            const currentMonthName = now.toLocaleString('fr-FR', { month: 'long' });
            const currentYear = now.getFullYear();
            const topPeriods = [
                { label: "Mois en cours", get: () => getBest(s => { const d = new Date(s.date); return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear(); }) || state.history[0] },
                { label: "Mois précédent", get: () => getBest(s => { const d = new Date(s.date); return d.getMonth() === (now.getMonth() === 0 ? 11 : now.getMonth() - 1) && d.getFullYear() === (now.getMonth() === 0 ? now.getFullYear() - 1 : now.getFullYear()); }) },
                { label: "Année en cours", get: () => getBest(s => new Date(s.date).getFullYear() === now.getFullYear()) },
                { label: "Année N-1", get: () => getBest(s => new Date(s.date).getFullYear() === now.getFullYear() - 1) }
            ];
            let html = `<div class="flex overflow-x-auto gap-4 no-scrollbar pb-6 snap-x">`;
            topPeriods.forEach(p => {
                const s = p.get();
                if (s && s.exercises) {
                    html += `
                    <div class="snap-center shrink-0 w-72 bg-slate-900 text-white p-6 rounded-[2.5rem] shadow-xl">
                        <div class="text-[9px] font-black uppercase text-indigo-400 mb-1 tracking-widest">${p.label}</div>
                        <div class="text-xs font-bold text-slate-400 mb-4">${new Date(s.date).toLocaleDateString('fr-FR')}</div>
                        <div class="space-y-3">
                            ${Object.entries(s.exercises).map(([id, data]) => `
                                <div class="flex justify-between items-center text-[10px]">
                                    <span class="text-slate-300 truncate pr-2 font-bold">${EX_CONFIG[id].name}</span>
                                    <span class="font-black text-indigo-300">${data.weight}kg • ${(data.reps.reduce((a,b)=>a+b,0) / data.reps.length).toFixed(1)}<small class="text-[8px] ml-0.5 opacity-60">r/s</small></span>
                                </div>`).join('')}
                        </div>
                    </div>`;
                } else {
                    html += `<div class="snap-center shrink-0 w-72 skeleton h-48 rounded-[2.5rem] flex items-center justify-center text-[10px] font-bold text-slate-300 uppercase">${p.label}</div>`;
                }
            });
            html += `</div><div class="mt-4 space-y-4">`;
            const groups = {};
            state.history.forEach((s, idx) => {
                const d = new Date(s.date);
                const y = d.getFullYear(); const m = d.toLocaleString('fr-FR', { month: 'long' });
                if (!groups[y]) groups[y] = {}; if (!groups[y][m]) groups[y][m] = [];
                groups[y][m].push({ ...s, idx });
            });
            Object.keys(groups).sort((a,b) => b-a).forEach(y => {
                const yearIsHidden = (parseInt(y) !== currentYear) ? 'hidden' : '';
                html += `
                <div class="year-group">
                    <button onclick="toggleAccordion('year-${y}', this)" class="flex items-center gap-2 mb-3">
                        <span class="text-2xl font-black text-slate-900 tracking-tighter">${y}</span>
                        <i data-lucide="chevron-down" class="w-5 h-5 text-indigo-500 transition-transform ${yearIsHidden ? '' : 'rotate-180'}"></i>
                    </button>
                    <div id="year-${y}" class="space-y-6 ml-2 border-l-2 border-slate-100 pl-4 ${yearIsHidden}">`;
                Object.keys(groups[y]).forEach(m => {
                    const monthIsHidden = (parseInt(y) === currentYear && m === currentMonthName) ? '' : 'hidden';
                    html += `
                    <div class="month-group">
                        <button onclick="toggleAccordion('month-${y}-${m}', this)" class="flex items-center gap-2 mb-3">
                            <span class="text-[10px] font-black uppercase text-slate-400 tracking-widest">${m}</span>
                            <i data-lucide="chevron-down" class="w-3 h-3 text-slate-300 transition-transform ${monthIsHidden ? 'rotate-180' : ''}"></i>
                        </button>
                        <div id="month-${y}-${m}" class="space-y-2 ${monthIsHidden}">`;
                    groups[y][m].forEach(s => {
                        html += `
                        <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
                            <button onclick="toggleAccordion('content-${s.idx}', this, true)" class="w-full p-4 flex justify-between items-center active:bg-slate-50">
                                <span class="text-xs font-black text-slate-700 uppercase tracking-tighter">${new Date(s.date).toLocaleDateString('fr-FR', { day:'numeric', month:'long' })}</span>
                                <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 transition-transform"></i>
                            </button>
                            <div id="content-${s.idx}" class="hidden px-4 pb-4 space-y-2 border-t border-slate-50 pt-3">
                                ${s.exercises ? Object.entries(s.exercises).map(([id, data]) => `
                                <div class="flex justify-between items-center text-[10px]">
                                    <span class="font-bold text-slate-500">${EX_CONFIG[id].name}</span>
                                    <span class="font-black text-slate-900">${data.weight}kg <span class="text-slate-200 mx-1">/</span> ${data.reps.join('-')}</span>
                                </div>`).join('') : ''}
                            </div>
                        </div>`;
                    });
                    html += `</div></div>`;
                });
                html += `</div></div>`;
            });
            document.getElementById('app-container').innerHTML = html + `</div>`; lucide.createIcons();
        }

        function toggleAccordion(id, btn) {
            const el = document.getElementById(id);
            const icon = btn.querySelector('[data-lucide="chevron-down"]');
            if(el) el.classList.toggle('hidden');
            if (icon) icon.style.transform = (el && !el.classList.contains('hidden')) ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        function renderProfile() {
            let html = `<div class="space-y-6">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
                    <h3 class="font-black uppercase text-[10px] tracking-widest text-slate-400 mb-6">Paramètres</h3>
                    <div class="space-y-8">`;
            Object.entries(EX_CONFIG).forEach(([id, cfg]) => {
                html += `
                    <div class="space-y-3">
                        <div class="text-xs font-black text-slate-800 uppercase">${cfg.name}</div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-[9px] font-bold text-slate-400 uppercase">Poids</label><input type="number" step="0.1" onchange="state.currentWeights['${id}']=parseFloat(this.value);save();" value="${state.currentWeights[id]}" class="w-full bg-slate-50 border rounded-xl p-3 font-black text-sm"></div>
                            <div><label class="text-[9px] font-bold text-slate-400 uppercase">Bond</label><input type="number" step="0.1" onchange="state.increments['${id}']=parseFloat(this.value);save();" value="${state.increments[id]}" class="w-full bg-slate-50 border border-indigo-100 rounded-xl p-3 font-black text-sm text-indigo-600"></div>
                        </div>
                    </div>`;
            });
            html += `</div></div>
                <div class="bg-slate-900 text-white p-8 rounded-[2.5rem] shadow-2xl">
                    <h3 class="font-black uppercase text-[10px] tracking-widest text-indigo-400 mb-4">Configuration Cloud</h3>
                    <div class="bg-white/10 p-4 rounded-2xl mb-4 border border-white/10">
                        <label class="text-[9px] font-bold text-slate-400 uppercase mb-1 block">ID npoint.io</label>
                        <input type="text" 
                               value="${state.syncKey}" 
                               onchange="updateSyncKey(this.value)" 
                               placeholder="Saisir ID de synchro"
                               class="w-full bg-transparent border-b border-white/20 text-white font-mono text-xs py-1 focus:outline-none focus:border-indigo-400">
                    </div>
                    <button onclick="checkCloudUpdate(true)" class="w-full bg-indigo-600 py-4 rounded-2xl font-black uppercase text-xs tracking-widest active:scale-95 transition">Récupérer données Cloud</button>
                    <button onclick="confirmResetCloud()" class="w-full mt-4 bg-red-500/20 text-red-400 py-3 rounded-2xl font-bold text-[10px] uppercase tracking-widest border border-red-500/30">Réinitialiser le Cloud</button>
                </div>
                <button onclick="resetApp()" class="w-full text-red-400 font-bold text-[10px] uppercase tracking-widest py-4">Réinitialiser les données locales</button>
            </div>`;
            document.getElementById('app-container').innerHTML = html;
        }

        // --- LOGIQUE SYNCHRO ---

        function updateSyncKey(val) {
            state.syncKey = val.trim();
            localStorage.setItem('sb_v5_state', JSON.stringify(state)); 
            if (state.syncKey) checkCloudUpdate(true);
        }

        function save() { 
            state.lastUpdated = Date.now();
            state.isDirty = true;
            localStorage.setItem('sb_v5_state', JSON.stringify(state)); 
            syncToCloud(); 
        }

        function updateSyncUI(status = 'local') {
            const dot = document.getElementById('sync-dot');
            const text = document.getElementById('sync-text');
            if(!dot || !text) return;

            if (status === 'loading') {
                dot.className = "w-2.5 h-2.5 rounded-full bg-amber-500 sync-active";
                text.innerText = "Synchronisation...";
            } else if (status === 'error') {
                dot.className = "w-2.5 h-2.5 rounded-full bg-red-500";
                text.innerText = "Erreur Cloud";
            } else if (!state.syncKey) {
                dot.className = "w-2.5 h-2.5 rounded-full bg-slate-300";
                text.innerText = "Non configuré";
            } else if (state.isDirty) {
                dot.className = "w-2.5 h-2.5 rounded-full bg-amber-500";
                text.innerText = "Modif. locales en attente";
            } else {
                dot.className = "w-2.5 h-2.5 rounded-full bg-green-500";
                text.innerText = "Synchronisé (Cloud OK)";
            }
        }

        async function syncToCloud() {
            if (!navigator.onLine || !state.syncKey) {
                updateSyncUI();
                return;
            }
            updateSyncUI('loading');
            try {
                const res = await fetch(API_BASE + state.syncKey, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(state)
                });
                if(res.ok) {
                    state.isDirty = false;
                    localStorage.setItem('sb_v5_state', JSON.stringify(state));
                    updateSyncUI('sync');
                } else {
                    updateSyncUI('error');
                }
            } catch(e) { 
                updateSyncUI('error');
            }
        }

        async function checkCloudUpdate(force = false) {
            if (!navigator.onLine || !state.syncKey) {
                updateSyncUI();
                return;
            }
            if (force) updateSyncUI('loading');

            try {
                const res = await fetch(API_BASE + state.syncKey + "?t=" + Date.now());
                if (res.ok) {
                    const cloudState = await res.json();
                    
                    if (!cloudState || !cloudState.lastUpdated) {
                        syncToCloud();
                        return;
                    }

                    if (cloudState.lastUpdated > state.lastUpdated || force) {
                        const currentKey = state.syncKey;
                        state = Object.assign(state, cloudState);
                        state.syncKey = currentKey;
                        
                        state.isDirty = false;
                        localStorage.setItem('sb_v5_state', JSON.stringify(state));
                        
                        const currentPage = document.querySelector('.nav-btn.text-indigo-600')?.id.replace('nav-', '') || 'workout';
                        router(currentPage);
                        
                        updateSyncUI('sync');
                    } 
                    else if (state.isDirty) {
                        await syncToCloud();
                    } else {
                        updateSyncUI('sync');
                    }
                }
            } catch(e) {
                updateSyncUI('error');
            }
        }

        function confirmResetCloud() {
            if (!state.syncKey) { alert("Aucun ID Cloud configuré."); return; }
            showGenericModal(
                "Reset Cloud ?", 
                "Attention, cela va écraser les données distantes par votre état local actuel.", 
                "alert-triangle", 
                () => { syncToCloud(); }, 
                () => {}
            );
        }

        function resetApp() { 
            if(confirm("Supprimer absolument toutes les données locales ?")) { 
                localStorage.clear(); 
                location.reload(); 
            } 
        }

        window.addEventListener('online', () => checkCloudUpdate());
        document.addEventListener('visibilitychange', () => { if (!document.hidden) checkCloudUpdate(); });

        setInterval(() => checkCloudUpdate(), 20000);

        (async function init() {
            const saved = localStorage.getItem('sb_v5_state');
            if (saved) {
                const parsed = JSON.parse(saved);
                state = Object.assign(state, parsed);
            }
            
            router('workout');

            if (navigator.onLine && state.syncKey) {
                setTimeout(() => checkCloudUpdate(true), 500);
            } else {
                updateSyncUI();
            }
        })();
    </script>
</body>
</html>
